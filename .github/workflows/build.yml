name: Build Dizdar Linux ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Live-Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap debian-archive-keyring squashfs-tools xorriso git curl wget unzip tar dconf-cli mtools syslinux isolinux


      - name: Patch Live-Build Contents Bug
        run: |
          sudo python3 -c '
          import os, re
          dir_paths = ["/usr/lib/live/build", "/usr/share/live/build/scripts/build"]
          for d in dir_paths:
              if os.path.exists(d):
                  print(f"Scanning directory: {d} for files containing Contents- ...")
                  for filename in os.listdir(d):
                      target_path = os.path.join(d, filename)
                      if os.path.isfile(target_path):
                          try:
                              with open(target_path, "r", encoding="utf-8", errors="ignore") as f:
                                  content = f.read()
                              if "Contents-" in content:
                                  new_content = re.sub(r"(dists/[^/]+)/Contents-", r"\1/main/Contents-", content)
                                  if new_content != content:
                                      print(f"Patching {filename}...")
                                      with open(target_path, "w", encoding="utf-8") as f:
                                          f.write(new_content)
                                      print(f"Successfully patched {filename}")
                          except Exception as e:
                              print(f"Error processing {filename}: {e}")
          '


      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build ISO
        run: |
          set -o pipefail
          sudo ./build.sh 2>&1 | tee build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Locate ISO file
        id: locate_iso
        run: |
          ISO_PATH=$(ls *.iso | head -n 1)
          echo "ISO_FILE=$ISO_PATH" >> $GITHUB_ENV
          echo "Found ISO: $ISO_PATH"

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dizdar-linux-iso
          path: ${{ env.ISO_FILE }}
          if-no-files-found: error
          retention-days: 5
