name: Build Dizdar Linux ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Live-Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap debian-archive-keyring squashfs-tools xorriso git curl wget unzip tar dconf-cli mtools

      - name: Patch Live-Build Contents Bug
        run: |
          sudo python3 -c '
          import os, re
          paths = ["/usr/lib/live/build/chroot_linux-image", "/usr/share/live/build/scripts/build/chroot_linux-image"]
          target_path = None
          for p in paths:
              if os.path.exists(p):
                  target_path = p
                  break
          if not target_path:
              print("Could not find chroot_linux-image script!")
              exit(1)
          print(f"Patching {target_path}...")
          with open(target_path, "r", encoding="utf-8") as f:
              lines = f.readlines()
          patched = False
          for i, line in enumerate(lines):
              if "Contents-" in line:
                  print(f"Original line {i+1}: {line.strip()}")
                  new_line = re.sub(r"(dists/[^/]+)/Contents-", r"\1/main/Contents-", line)
                  if new_line != line:
                      lines[i] = new_line
                      print(f"Patched line {i+1}: {new_line.strip()}")
                      patched = True
          if patched:
              with open(target_path, "w", encoding="utf-8") as f:
                  f.writelines(lines)
              print("Successfully patched!")
          else:
              print("No changes made.")
          '

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build ISO
        run: |
          set -o pipefail
          sudo ./build.sh 2>&1 | tee build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Locate ISO file
        id: locate_iso
        run: |
          ISO_PATH=$(ls *.iso | head -n 1)
          echo "ISO_FILE=$ISO_PATH" >> $GITHUB_ENV
          echo "Found ISO: $ISO_PATH"

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dizdar-linux-iso
          path: ${{ env.ISO_FILE }}
          if-no-files-found: error
          retention-days: 5
