name: Build Dizdar Linux ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Live-Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap debian-archive-keyring squashfs-tools xorriso git curl wget unzip tar dconf-cli mtools syslinux isolinux librsvg2-bin
          sudo ln -sf /usr/bin/rsvg-convert /usr/bin/rsvg

      - name: Debug Live-Build Scripts
        run: |
          echo "=== RSVG usages in lb_binary_syslinux ==="
          grep -n -C 5 "rsvg" /usr/lib/live/build/lb_binary_syslinux || true
          echo "=== Bootlogo usages in lb_binary_syslinux ==="
          grep -n -C 5 "bootlogo" /usr/lib/live/build/lb_binary_syslinux || true

      - name: Prepare Bootloader Files
        run: |
          sudo mkdir -p config/bootloaders/isolinux
          TEMPLATES_DIR=""
          for d in "/usr/share/live/build/bootloaders/isolinux" "/usr/share/live-build/bootloaders/isolinux" "/usr/share/live/build/bootloader/isolinux"; do
            if [ -d "$d" ]; then
              TEMPLATES_DIR="$d"
              break
            fi
          done
          if [ -n "$TEMPLATES_DIR" ]; then
            echo "Found live-build bootloader templates at $TEMPLATES_DIR"
            sudo cp -rL "$TEMPLATES_DIR"/* config/bootloaders/isolinux/ || true
          else
            echo "WARNING: live-build bootloader templates not found on host!"
          fi
          
          # Remove symlinks that will be overwritten to prevent cp dangling symlink errors
          sudo rm -f config/bootloaders/isolinux/isolinux.bin
          sudo rm -f config/bootloaders/isolinux/*.c32
          
          ISOLINUX_BIN=$(sudo find /usr -name "isolinux.bin" 2>/dev/null | head -n 1)
          if [ -n "$ISOLINUX_BIN" ]; then
            echo "Found isolinux.bin at $ISOLINUX_BIN"
            sudo cp -L "$ISOLINUX_BIN" config/bootloaders/isolinux/isolinux.bin
          else
            echo "isolinux.bin not found!"
          fi
          VESAMENU_C32=$(sudo find /usr -path "*bios*" -name "vesamenu.c32" 2>/dev/null | head -n 1)
          if [ -n "$VESAMENU_C32" ]; then
            echo "Found vesamenu.c32 at $VESAMENU_C32"
            BIOS_DIR=$(dirname "$VESAMENU_C32")
            sudo cp -rL "$BIOS_DIR"/* config/bootloaders/isolinux/ || true
          else
            echo "vesamenu.c32 not found!"
          fi

      - name: Patch Live-Build Contents Bug
        run: |
          sudo python3 -c '
          import os, re
          dir_paths = ["/usr/lib/live/build", "/usr/share/live/build/scripts/build"]
          for d in dir_paths:
              if os.path.exists(d):
                  print(f"Scanning directory: {d} for files containing Contents- ...")
                  for filename in os.listdir(d):
                      target_path = os.path.join(d, filename)
                      if os.path.isfile(target_path):
                          try:
                              with open(target_path, "r", encoding="utf-8", errors="ignore") as f:
                                  content = f.read()
                              
                              new_content = content
                              if "Contents-" in content:
                                  new_content = re.sub(r"(dists/[^/]+)/Contents-", r"\1/main/Contents-", content)
                                  if new_content != content:
                                      print(f"Patching Contents- in {filename}...")
                              
                              if "syslinux" in filename:
                                  target1 = "(cd \"$tmpdir\" && cpio -i) < ${_TARGET}/bootlogo"
                                  rep1 = "{ test -f \"${_TARGET}/bootlogo\" && (cd \"$tmpdir\" && cpio -i) < \"${_TARGET}/bootlogo\"; } || true"
                                  target2 = "(cd \"$tmpdir\" && ls -1 | cpio --quiet -o) > ${_TARGET}/bootlogo"
                                  rep2 = "{ test -f \"${_TARGET}/bootlogo\" && (cd \"$tmpdir\" && ls -1 | cpio --quiet -o) > \"${_TARGET}/bootlogo\"; } || true"
                                  if target1 in new_content:
                                      new_content = new_content.replace(target1, rep1)
                                      print(f"Patched bootlogo read in {filename}")
                                  if target2 in new_content:
                                      new_content = new_content.replace(target2, rep2)
                                      print(f"Patched bootlogo write in {filename}")

                              if new_content != content:
                                  with open(target_path, "w", encoding="utf-8") as f:
                                      f.write(new_content)
                                  print(f"Successfully wrote changes to {filename}")
                          except Exception as e:
                              print(f"Error processing {filename}: {e}")
          '


      - name: Make build script and hooks executable
        run: |
          chmod +x build.sh
          chmod -R +x config/hooks/ || true

      - name: Build ISO
        run: |
          set -o pipefail
          sudo ./build.sh 2>&1 | tee build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Locate ISO file
        id: locate_iso
        run: |
          ISO_PATH=$(ls *.iso | head -n 1)
          echo "ISO_FILE=$ISO_PATH" >> $GITHUB_ENV
          echo "Found ISO: $ISO_PATH"

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dizdar-linux-iso
          path: ${{ env.ISO_FILE }}
          if-no-files-found: error
          retention-days: 5
